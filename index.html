<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Raj Marketing · Mosquito Nets · Mysore</title>
    
    <!-- Google Fonts - Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        /* Additional styles specific to index */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #1a2c2d;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 0 0 20px 0;
        }

        .app-container {
            max-width: 390px;
            width: 100%;
            background: linear-gradient(145deg, #f5faf8 0%, #e8f0ed 100%);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            border-radius: 36px 36px 0 0;
            margin: 8px 0 0 0;
            overflow: hidden;
            position: relative;
            padding-bottom: 70px;
        }

        /* ===== TOP HEADER ===== */
        .top-header {
            height: 64px;
            background: linear-gradient(135deg, #ffffff 0%, #f8fcfb 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            box-shadow: 0 10px 30px -5px rgba(30, 75, 139, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(230, 180, 34, 0.2);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .hamburger-icon {
            font-size: 24px;
            color: #1e4b8b;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(30, 75, 139, 0.1);
            padding: 8px;
            border-radius: 12px;
        }

        .hamburger-icon:hover {
            background: #1e4b8b;
            color: white;
        }

        .header-center {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .business-name {
            font-size: 16px;
            font-weight: 700;
            background: linear-gradient(135deg, #1e4b8b, #2a6bb3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.2px;
        }

        .business-location {
            font-size: 10px;
            color: #e6b422;
            font-weight: 600;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .notification-icon, .admin-icon {
            font-size: 22px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .notification-icon {
            color: #e6b422;
        }

        .admin-icon {
            color: #1e4b8b;
        }

        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff4444;
            color: white;
            font-size: 10px;
            padding: 2px 5px;
            border-radius: 10px;
            font-weight: 600;
        }

        /* ===== DROPDOWN MENU ===== */
        .dropdown-menu {
            position: fixed;
            top: 64px;
            left: -300px;
            width: 280px;
            height: calc(100% - 64px);
            background: white;
            z-index: 1000;
            transition: left 0.3s ease;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border-radius: 0 30px 30px 0;
            padding: 20px 0;
            overflow-y: auto;
        }

        .dropdown-menu.active {
            left: 0;
        }

        .menu-header {
            padding: 20px 25px;
            border-bottom: 2px solid rgba(30, 75, 139, 0.1);
            margin-bottom: 15px;
        }

        .menu-header h3 {
            color: #1e4b8b;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .menu-header p {
            color: #e6b422;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .menu-items {
            list-style: none;
            padding: 0 15px;
        }

        .menu-items li {
            margin-bottom: 5px;
        }

        .menu-items li a {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            color: #1e4b8b;
            text-decoration: none;
            font-weight: 500;
            border-radius: 15px;
            transition: all 0.3s;
        }

        .menu-items li a i {
            width: 24px;
            color: #e6b422;
            font-size: 1.1rem;
        }

        .menu-items li a:hover {
            background: linear-gradient(135deg, #1e4b8b, #2a6bb3);
            color: white;
            transform: translateX(5px);
        }

        .menu-items li a:hover i {
            color: white;
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
        }

        .menu-overlay.active {
            display: block;
        }

        /* ===== LIVE CUSTOMER COUNTER ===== */
        .live-counter {
            background: rgba(230, 180, 34, 0.15);
            border-radius: 30px;
            padding: 8px 16px;
            margin: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(230, 180, 34, 0.3);
        }

        .counter-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .counter-left i {
            color: #e6b422;
            font-size: 1.2rem;
            animation: pulse 1.5s infinite;
        }

        .counter-text {
            font-size: 0.8rem;
            color: #1e4b8b;
            font-weight: 500;
        }

        .counter-number {
            background: linear-gradient(135deg, #1e4b8b, #2a6bb3);
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.9rem;
        }

        /* ===== MAIN SLIDER ===== */
        .main-slider {
            width: 100%;
            height: 190px;
            margin: 12px 0 5px 0;
            padding: 0 12px;
        }

        .main-slider .swiper-slide {
            background-size: cover;
            background-position: center;
            border-radius: 28px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.3);
        }

        .main-slider .swiper-slide::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60%;
            background: linear-gradient(to top, rgba(0,20,30,0.9), transparent);
            border-radius: 28px;
        }

        .slide-content {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            z-index: 2;
            font-weight: 600;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .slide-title {
            font-size: 1.2rem;
            display: block;
            font-weight: 800;
            background: linear-gradient(135deg, #e6b422, #ffd966);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .slide-content small {
            display: block;
            font-size: 0.8rem;
            opacity: 0.95;
            color: white;
            font-weight: 500;
        }

        /* ===== LIVE MOVING TEXT ADS - SLOW VERSION ===== */
        .live-notification-bar {
            background: white;
            margin: 8px 16px 12px 16px;
            border-radius: 50px;
            padding: 12px 0;
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.1);
            border: 2px solid #1e4b8b;
            overflow: hidden;
            position: relative;
        }

        .live-notification-bar::before {
            content: '🔴 LIVE';
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: #ff4444;
            color: white;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 700;
            z-index: 2;
            animation: pulse 2s infinite;
        }

        .marquee-container {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            padding: 0 20px 0 80px;
        }

        .marquee-content {
            display: inline-block;
            animation: marquee-slow 45s linear infinite;
            color: #000000;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
        }

        .marquee-content span {
            margin-right: 45px;
            display: inline-block;
        }

        .marquee-content i {
            color: #e6b422;
            margin-right: 10px;
            font-size: 0.7rem;
        }

        .marquee-content strong {
            color: #e6b422;
            font-weight: 800;
            background: rgba(230, 180, 34, 0.1);
            padding: 3px 10px;
            border-radius: 40px;
            margin: 0 5px;
            font-size: 0.9rem;
        }

        .marquee-content .customer-name {
            color: #28a745;
            font-weight: 800;
        }

        @keyframes marquee-slow {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        /* ===== LIVE BUSINESS OVERVIEW ===== */
        .business-overview {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 16px;
            padding: 16px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .overview-item {
            text-align: center;
        }

        .overview-icon {
            width: 45px;
            height: 45px;
            background: rgba(30, 75, 139, 0.1);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
        }

        .overview-icon i {
            font-size: 1.3rem;
            color: #1e4b8b;
        }

        .overview-label {
            font-size: 0.6rem;
            color: #6b7a7c;
            font-weight: 500;
        }

        .overview-count {
            font-size: 0.9rem;
            font-weight: 700;
            color: #1e4b8b;
        }

        .overview-period {
            font-size: 0.55rem;
            color: #e6b422;
            display: flex;
            gap: 5px;
            justify-content: center;
            margin-top: 3px;
        }

        .period-item {
            cursor: pointer;
            padding: 2px 5px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .period-item.active {
            background: #1e4b8b;
            color: white;
        }

        /* ===== SECTION TITLE ===== */
        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 16px 8px 16px;
        }

        .section-title h3 {
            font-weight: 700;
            font-size: 1.2rem;
            color: #1e4b8b;
        }

        .view-all-link {
            font-size: 0.75rem;
            color: #e6b422;
            text-decoration: none;
            font-weight: 600;
        }

        /* ===== PRIME SERVICES GRID ===== */
        .prime-services-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 8px 16px 20px 16px;
        }

        .prime-service-card {
            background: white;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .prime-service-image {
            height: 120px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .prime-service-tag {
            position: absolute;
            top: 10px;
            right: 10px;
            background: linear-gradient(135deg, #e6b422, #f5c542);
            color: #1e3a3a;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.65rem;
        }

        .prime-service-info {
            padding: 12px;
        }

        .prime-service-info h4 {
            font-size: 0.9rem;
            font-weight: 700;
            color: #1e4b8b;
            margin-bottom: 4px;
        }

        .prime-service-info p {
            font-size: 0.7rem;
            color: #6b7a7c;
            margin-bottom: 8px;
        }

        .prime-service-actions {
            display: flex;
            gap: 8px;
        }

        .price-check-btn, .estimate-btn, .order-btn {
            flex: 1;
            padding: 6px 0;
            border: none;
            border-radius: 20px;
            font-size: 0.6rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .price-check-btn {
            background: rgba(30, 75, 139, 0.1);
            color: #1e4b8b;
        }

        .estimate-btn {
            background: rgba(230, 180, 34, 0.1);
            color: #e6b422;
        }

        .order-btn {
            background: linear-gradient(135deg, #1e4b8b, #2a6bb3);
            color: white;
        }

        /* ===== QUICK ACTIONS GRID ===== */
        .quick-actions-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 8px 16px 20px 16px;
        }

        .quick-action-card {
            text-align: center;
        }

        .quick-action-circle {
            width: 60px;
            height: 60px;
            margin: 0 auto 8px;
            background: linear-gradient(135deg, #1e4b8b, #2a6bb3);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.4rem;
            transition: 0.3s;
            cursor: pointer;
        }

        .quick-action-circle:hover {
            transform: scale(1.1);
            background: #e6b422;
        }

        .quick-action-card span {
            font-size: 0.65rem;
            font-weight: 600;
            color: #1e4b8b;
        }

        /* ===== BANNER ADS ===== */
        .banner-ads-slider {
            margin: 16px;
            padding-bottom: 30px !important;
        }

        .banner-ads-slider .swiper-slide {
            height: 100px;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }

        .banner-ad-content {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* ===== LIMITED TIME OFFERS ===== */
        .offers-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 8px 16px 20px 16px;
        }

        .offer-card {
            background: linear-gradient(135deg, #1e4b8b, #2a6bb3);
            border-radius: 25px;
            padding: 16px;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .offer-card::before {
            content: '';
            position: absolute;
            top: -20px;
            right: -20px;
            width: 80px;
            height: 80px;
            background: rgba(230, 180, 34, 0.3);
            border-radius: 50%;
        }

        .offer-icon {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #e6b422;
        }

        .offer-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .offer-desc {
            font-size: 0.65rem;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .offer-code {
            background: rgba(230, 180, 34, 0.3);
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.6rem;
            font-weight: 600;
            display: inline-block;
        }

        .offer-validity {
            font-size: 0.55rem;
            margin-top: 8px;
            opacity: 0.7;
        }

        /* ===== MOSQUITO NET BAZAAR ===== */
        .bazaar-slider {
            margin: 8px 16px 20px 16px;
            padding-bottom: 30px !important;
        }

        .bazaar-slider .swiper-slide {
            width: 160px;
        }

        .bazaar-sample-card {
            background: white;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .sample-image {
            height: 140px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .sample-tag {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #e6b422;
            color: #1e3a3a;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.65rem;
        }

        .sample-info {
            padding: 12px;
        }

        .sample-info h4 {
            font-size: 0.9rem;
            font-weight: 700;
            color: #1e4b8b;
            margin-bottom: 4px;
        }

        .sample-info p {
            font-size: 0.7rem;
            color: #6b7a7c;
        }

        /* ===== BOTTOM NAVIGATION ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            max-width: 390px;
            width: 100%;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 12px 10px 18px 10px;
            border-top: 1px solid rgba(0,0,0,0.05);
            border-radius: 30px 30px 0 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.1);
            z-index: 9;
        }
